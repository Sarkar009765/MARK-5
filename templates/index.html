<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawVis - Neural Knowledge OS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(20, 25, 40, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #00d2ff;
            --primary-glow: rgba(0, 210, 255, 0.4);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --user-msg: rgba(0, 210, 255, 0.15);
            --bot-msg: rgba(30, 41, 59, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 210, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(58, 0, 255, 0.08), transparent 25%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Glassmorphism Container */
        .app-container {
            width: 90%;
            max-width: 1000px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Header */
        .header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-orb {
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary-glow);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 10px var(--primary-glow); }
            50% { box-shadow: 0 0 25px var(--primary-glow), 0 0 5px var(--primary); }
            100% { box-shadow: 0 0 10px var(--primary-glow); }
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            font-size: 0.85rem;
            color: var(--primary);
            background: rgba(0, 210, 255, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 210, 255, 0.2);
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 1rem;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-msg);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bot-msg);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
            color: #f8fafc;
        }

        /* Formatting within messages */
        .message pre {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            margin-top: 10px;
        }
        .message code {
            font-family: monospace;
            color: var(--primary);
        }

        /* Input Area */
        .input-area {
            padding: 20px 30px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
        }

        .input-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 15px 20px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-box:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.15);
        }

        .send-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            width: 50px;
            height: 50px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            background: var(--primary);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transform: translateX(2px);
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--bot-msg);
            padding: 12px 20px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--glass-border);
        }

        .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            margin: 0 3px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="logo-area">
                <div class="logo-orb"></div>
                <h1>CLAWVIS</h1>
            </div>
            <div class="status">System Online</div>
        </div>

        <div class="chat-container" id="chatContainer">
            <!-- Messages will be injected here -->
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" class="input-box" placeholder="Ask Jarvis anything or type a command..." autocomplete="off">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typingIndicator');

        // Allow 'Enter' key to send message
        userInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Basic Markdown parser for code blocks and bold text
        function parseMarkdown(text) {
            if (!text) return "";
            let html = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.innerHTML = parseMarkdown(text);
            chatContainer.appendChild(msgDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();
                if (data.history) {
                    data.history.forEach(msg => {
                        appendMessage(msg.role, msg.content);
                    });
                } else {
                    // Initial greeting if no history
                    appendMessage('bot', "Hello, I am ClawVis. How may I assist you today?");
                }
            } catch (e) {
                console.error("Failed to load history", e);
                appendMessage('bot', "Hello, I am ClawVis. How may I assist you today?");
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            
            // Show typing indicator
            chatContainer.appendChild(typingIndicator);
            typingIndicator.style.display = 'block';
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                
                // Hide typing indicator
                typingIndicator.style.display = 'none';
                
                if (data.response) {
                    appendMessage('bot', data.response);
                } else {
                    appendMessage('bot', "Error: Could not get response.");
                }
            } catch (e) {
                typingIndicator.style.display = 'none';
                appendMessage('bot', "System Error: Disconnected from Brain.");
            }
        }

        // Initialize
        loadHistory();
    </script>
</body>
</html>
